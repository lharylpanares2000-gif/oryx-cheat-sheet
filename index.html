<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Cheat Sheet — Oryx</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --oryx-blue:#022A3A;
    --oryx-blue-tint:#0C4A63;
    --white:#FFFFFF;
    --silver:#A9A9A9;
    --black:#000000;
    --panel:#F6F8F9;
    --line:rgba(2,42,58,0.14);
    --line-soft:rgba(2,42,58,0.08);
    --font-display:'Archivo',sans-serif;
    --font-body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--white);
    color:var(--black);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--oryx-blue);}

  /* ---------- Header ---------- */
  header{
    position:relative;
    padding:40px 48px 0;
    overflow:hidden;
  }
  .sweep{
    position:absolute;
    top:-40px;
    right:-40px;
    width:420px;
    height:220px;
    pointer-events:none;
  }
  .header-inner{
    position:relative;
    z-index:1;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:20px;
    padding-bottom:24px;
  }
  .brand-mark{display:flex;flex-direction:column;gap:6px;}
  .eyebrow{
    font-family:var(--font-display);font-weight:600;font-size:12px;
    letter-spacing:0.22em;text-transform:uppercase;color:var(--silver);
  }
  h1{
    font-family:var(--font-display);font-weight:700;font-size:34px;
    letter-spacing:0.01em;color:var(--oryx-blue);margin:0;
  }
  .tagline{
    font-size:13px;letter-spacing:0.16em;text-transform:uppercase;
    font-family:var(--font-display);font-weight:500;color:var(--silver);
    padding-top:10px;border-top:1px solid var(--line);margin-top:4px;width:fit-content;
  }
  .sync-status{
    font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
    font-family:var(--font-display);font-weight:500;color:var(--silver);
    display:flex;align-items:center;gap:6px;margin-top:2px;
  }
  .sync-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--silver);}
  .sync-status.live::before{background:#2f7a4d;}
  .sync-status.error::before{background:#8a2b2b;}

  /* ---------- Main nav (Reference Library / Team Notes) ---------- */
  .main-nav{
    display:flex;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
  }
  .main-nav-btn{
    font-family:var(--font-display);
    font-weight:600;
    font-size:13px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:16px 28px;
    background:var(--white);
    color:var(--silver);
    border:none;
    border-right:1px solid var(--line);
    cursor:pointer;
    transition:all 0.15s ease;
  }
  .main-nav-btn:hover{color:var(--oryx-blue);}
  .main-nav-btn.active{color:var(--oryx-blue);background:var(--panel);box-shadow:inset 0 -2px 0 var(--oryx-blue);}

  .view{display:none;padding:0 48px 64px;}
  .view.active{display:block;}

  /* ---------- Controls ---------- */
  .controls{
    padding:24px 0;
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    align-items:center;
    border-bottom:1px solid var(--line);
  }
  .search-wrap{flex:1;min-width:220px;position:relative;}
  .search-wrap input{
    width:100%;padding:12px 14px 12px 38px;border:1px solid var(--line);
    background:var(--panel);font-family:var(--font-body);font-size:14px;color:var(--black);
  }
  .search-wrap input:focus{outline:none;border-color:var(--oryx-blue);}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--silver);}
  .tabs{display:flex;flex-wrap:wrap;gap:8px;}
  .tab{
    font-family:var(--font-display);font-weight:600;font-size:11px;letter-spacing:0.08em;
    text-transform:uppercase;padding:10px 14px;border:1px solid var(--line);
    background:var(--white);color:var(--oryx-blue);cursor:pointer;transition:all 0.15s ease;
  }
  .tab:hover{border-color:var(--oryx-blue);}
  .tab.active{background:var(--oryx-blue);color:var(--white);border-color:var(--oryx-blue);}

  .sub-tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-top:24px;}
  .sub-tab{
    font-family:var(--font-display);font-weight:600;font-size:12px;letter-spacing:0.08em;
    text-transform:uppercase;padding:12px 18px;background:none;border:none;
    color:var(--silver);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
  }
  .sub-tab:hover{color:var(--oryx-blue);}
  .sub-tab.active{color:var(--oryx-blue);border-bottom-color:var(--oryx-blue);}

  /* ---------- Grid ---------- */
  .count-row{
    font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:var(--silver);
    font-family:var(--font-display);font-weight:500;margin:18px 0;
  }
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
  .card{
    position:relative;background:var(--white);border:1px solid var(--line);padding:20px;
    display:flex;flex-direction:column;gap:10px;transition:border-color 0.15s ease;cursor:pointer;
  }
  .card:hover{border-color:var(--oryx-blue);}
  .card::before, .card::after{
    content:'';position:absolute;width:14px;height:14px;border:1px solid transparent;transition:border-color 0.15s ease;
  }
  .card::before{top:-1px;left:-1px;border-top-color:var(--line);border-left-color:var(--line);}
  .card::after{top:-1px;right:-1px;border-top-color:var(--line);border-right-color:var(--line);}
  .card:hover::before{border-top-color:var(--oryx-blue);border-left-color:var(--oryx-blue);}
  .card:hover::after{border-top-color:var(--oryx-blue);border-right-color:var(--oryx-blue);}
  .card-tag{font-family:var(--font-display);font-weight:600;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--oryx-blue);}
  .card-title{font-family:var(--font-display);font-weight:600;font-size:16px;color:var(--black);margin:0;line-height:1.3;}
  .card-body{font-size:13.5px;line-height:1.6;color:#333;white-space:pre-wrap;margin:0;}
  .card-link{font-size:12.5px;word-break:break-all;}
  .card-footer{
    margin-top:auto;padding-top:10px;border-top:1px solid var(--line-soft);
    display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--silver);gap:8px;flex-wrap:wrap;
  }
  .card-badge{
    font-family:var(--font-display);font-weight:600;font-size:10px;letter-spacing:0.05em;
    text-transform:uppercase;background:var(--panel);color:var(--oryx-blue);padding:4px 8px;
  }
  .card-del{
    background:none;border:none;color:var(--silver);cursor:pointer;font-size:11px;letter-spacing:0.05em;
    text-transform:uppercase;font-family:var(--font-display);padding:0;
  }
  .card-del:hover{color:#8a2b2b;}
  .empty{padding:60px 20px;text-align:center;color:var(--silver);font-size:14px;grid-column:1/-1;border:1px dashed var(--line);}

  .add-btn{
    font-family:var(--font-display);font-weight:600;font-size:13px;letter-spacing:0.06em;
    text-transform:uppercase;background:var(--oryx-blue);color:var(--white);border:none;
    padding:14px 22px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:background 0.15s ease;
  }
  .add-btn:hover{background:var(--oryx-blue-tint);}

  /* ---------- Overlay / detail + add panel ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(2,42,58,0.35);display:none;
    align-items:flex-start;justify-content:flex-end;z-index:50;
  }
  .overlay.open{display:flex;}
  .panel{
    background:var(--white);width:460px;max-width:100%;height:100%;overflow-y:auto;
    padding:32px;border-left:1px solid var(--line);
  }
  .panel h2{font-family:var(--font-display);font-size:20px;color:var(--oryx-blue);margin:0 0 4px;}
  .panel .sub{
    font-size:12px;color:var(--silver);margin:0 0 24px;text-transform:uppercase;
    letter-spacing:0.08em;font-family:var(--font-display);
  }

  /* ---------- Detail panel header ---------- */
  #detailPanel{padding:0;}
  .panel-header{
    position:relative;overflow:hidden;background:var(--oryx-blue);color:var(--white);
    margin:0 0 28px;padding:44px 32px 28px;
  }
  .panel-sweep{position:absolute;top:-30px;right:-30px;width:240px;height:150px;pointer-events:none;opacity:0.4;}
  .panel-eyebrow{
    position:relative;z-index:1;display:block;font-family:var(--font-display);font-weight:600;
    font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.6);
  }
  .panel-header h2{
    position:relative;z-index:1;font-family:var(--font-display);font-weight:700;font-size:27px;
    line-height:1.28;color:var(--white);margin:10px 0 0;letter-spacing:0.005em;
  }
  .panel-body{padding:0 32px 32px;}
  .close-x-light{color:rgba(255,255,255,0.65);}
  .close-x-light:hover{color:var(--white);}

  .detail-block{margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid var(--line-soft);}
  .detail-block:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
  .detail-label{
    font-family:var(--font-display);font-weight:600;font-size:10.5px;letter-spacing:0.14em;
    text-transform:uppercase;color:var(--oryx-blue);margin-bottom:8px;padding-left:13px;position:relative;
  }
  .detail-label::before{content:'';position:absolute;left:0;top:4px;width:6px;height:6px;background:var(--oryx-blue);}
  .detail-value{font-size:14.5px;line-height:1.7;color:var(--black);white-space:pre-wrap;}
  .detail-value.mono{font-family:monospace;background:var(--panel);padding:10px 12px;font-size:13px;}
  .detail-tip{background:var(--panel);border-left:3px solid var(--oryx-blue);padding:14px 16px;font-size:13.5px;line-height:1.65;}

  label{
    display:block;font-family:var(--font-display);font-weight:600;font-size:11px;letter-spacing:0.06em;
    text-transform:uppercase;color:var(--oryx-blue);margin:18px 0 6px;
  }
  input[type=text], select, textarea{
    width:100%;padding:11px 12px;border:1px solid var(--line);background:var(--panel);
    font-family:var(--font-body);font-size:14px;color:var(--black);
  }
  input[type=text]:focus, select:focus, textarea:focus{outline:none;border-color:var(--oryx-blue);}
  textarea{resize:vertical;min-height:100px;}
  .panel-actions{display:flex;gap:10px;margin-top:28px;}
  .btn-primary, .btn-ghost{
    font-family:var(--font-display);font-weight:600;font-size:12px;letter-spacing:0.06em;
    text-transform:uppercase;padding:12px 18px;cursor:pointer;border:1px solid var(--oryx-blue);
  }
  .btn-primary{background:var(--oryx-blue);color:var(--white);flex:1;}
  .btn-primary:hover{background:var(--oryx-blue-tint);}
  .btn-ghost{background:var(--white);color:var(--oryx-blue);}
  .close-x{
    position:absolute;top:28px;right:28px;background:none;border:none;cursor:pointer;
    color:var(--silver);font-size:20px;line-height:1;
  }
  .field-error{font-size:12px;color:#8a2b2b;margin-top:6px;display:none;}

  @media(max-width:640px){
    header, .view{padding-left:20px;padding-right:20px;}
    .panel{width:100%;}
  }
</style>
</head>
<body>

<header>
  <svg class="sweep" viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
    <path d="M420 10 C300 10 210 70 150 220" stroke="var(--oryx-blue)" stroke-width="3" fill="none" opacity="0.5"/>
    <path d="M420 30 C310 32 230 90 185 220" stroke="var(--oryx-blue)" stroke-width="3" fill="none" opacity="0.25"/>
  </svg>
  <div class="header-inner">
    <div class="brand-mark">
      <span class="eyebrow">Oryx · Internal Resource</span>
      <h1>Claude Cheat Sheet</h1>
      <span class="tagline">Skills &amp; Commands &amp; Tips</span>
      <span class="sync-status" id="syncStatus">Connecting…</span>
    </div>
  </div>
  <div class="main-nav">
    <button class="main-nav-btn active" data-view="library">Reference Library</button>
    <button class="main-nav-btn" data-view="notes">Team Notes</button>
  </div>
</header>

<!-- ===================== REFERENCE LIBRARY ===================== -->
<div class="view active" id="view-library">
  <div class="sub-tabs" id="libSubTabs">
    <button class="sub-tab active" data-lib="skills">Skills</button>
    <button class="sub-tab" data-lib="shortcuts">Shortcuts</button>
    <button class="sub-tab" data-lib="tools">AI Tools</button>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="libSearch" placeholder="Search the reference library…">
    </div>
    <div class="tabs" id="libFilterTabs"></div>
  </div>

  <div class="count-row" id="libCount"></div>
  <div class="grid" id="libGrid"></div>
</div>

<!-- ===================== TEAM NOTES ===================== -->
<div class="view" id="view-notes">
  <div class="controls" style="border-bottom:none;padding-top:24px;">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search team notes…">
    </div>
    <button class="add-btn" id="openAdd">+ Add Entry</button>
  </div>
  <div class="controls" style="padding-top:0;">
    <div class="tabs" id="tabs">
      <button class="tab active" data-cat="all">All</button>
      <button class="tab" data-cat="commands">Commands</button>
      <button class="tab" data-cat="prompting">Prompting</button>
      <button class="tab" data-cat="skills">Skills &amp; Workflows</button>
      <button class="tab" data-cat="resources">Resources</button>
      <button class="tab" data-cat="discoveries">Discoveries</button>
    </div>
  </div>
  <div class="count-row" id="countRow">Loading entries…</div>
  <div class="grid" id="grid"></div>
</div>

<!-- Detail panel (Team Notes) -->
<div class="overlay" id="detailOverlay">
  <div class="panel" id="detailPanel"></div>
</div>

<!-- Add entry panel (Team Notes) -->
<div class="overlay" id="overlay">
  <div class="panel">
    <button class="close-x" id="closePanel">&times;</button>
    <h2>Add an entry</h2>
    <p class="sub">Visible to the whole team</p>

    <label for="fCategory">Category</label>
    <select id="fCategory">
      <option value="commands">Commands / CLI</option>
      <option value="prompting">Prompting technique</option>
      <option value="skills">Skill / workflow</option>
      <option value="resources">Resource / link</option>
      <option value="discoveries">Discovery / note</option>
    </select>

    <label for="fTitle">Title</label>
    <input type="text" id="fTitle" placeholder="e.g. /compact — trim context mid-session">
    <div class="field-error" id="errTitle">Give it a title.</div>

    <div id="simpleFields">
      <label for="fBody">Details</label>
      <textarea id="fBody" placeholder="What it does, when to use it, gotchas…"></textarea>
      <div class="field-error" id="errBody">Add a bit of detail.</div>
    </div>

    <div id="skillFields" style="display:none;">
      <label for="fDepartment">Department</label>
      <input type="text" id="fDepartment" placeholder="e.g. Sales and Marketing">

      <label for="fPurpose">Purpose</label>
      <textarea id="fPurpose" placeholder="What does this skill do?"></textarea>
      <div class="field-error" id="errPurpose">Add a purpose.</div>

      <label for="fSamplePrompt">Sample prompt</label>
      <textarea id="fSamplePrompt" placeholder="An example prompt someone could paste in"></textarea>

      <label for="fBestFor">Best for</label>
      <textarea id="fBestFor" placeholder="When should someone reach for this?"></textarea>

      <label for="fExampleOutput">Example output</label>
      <textarea id="fExampleOutput" placeholder="Before/after or sample result"></textarea>

      <label for="fNotes">Notes</label>
      <textarea id="fNotes" placeholder="Gotchas, limitations, tips"></textarea>

      <label for="fHowToAccess">How to access</label>
      <textarea id="fHowToAccess" placeholder="Steps to find and run this skill"></textarea>

      <label for="fOryxTip">How it helps Oryx Doors and Windows</label>
      <textarea id="fOryxTip" placeholder="A concrete Oryx use case"></textarea>
    </div>

    <label for="fLink">Link (optional)</label>
    <input type="text" id="fLink" placeholder="https://…">

    <label for="fAuthor">Your name</label>
    <input type="text" id="fAuthor" placeholder="e.g. Sara">

    <div class="panel-actions">
      <button class="btn-ghost" id="cancelAdd">Cancel</button>
      <button class="btn-primary" id="saveAdd">Save entry</button>
    </div>
  </div>
</div>

<script>
const REFERENCE_DATA = {"skills": [], "shortcuts": [], "tools": []};
</script>

<script>
// ============= Firebase =============
const firebaseConfig = {
  apiKey: "AIzaSyAyux2Zu-651KTK7w8BowxbV9Hjb6t_2UE",
  authDomain: "oryx-cheat-sheet.firebaseapp.com",
  projectId: "oryx-cheat-sheet",
  storageBucket: "oryx-cheat-sheet.firebasestorage.app",
  messagingSenderId: "449130107014",
  appId: "1:449130107014:web:6539982ce0bdc1fb910107"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const entriesCollection = db.collection('entries');
const AUTHOR_KEY = 'oryx-cheatsheet-author-name';
const syncStatusEl = document.getElementById('syncStatus');

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str == null ? '' : String(str);
  return d.innerHTML;
}
function isValidLink(url){
  try{ const u = new URL(url); return u.protocol === 'http:' || u.protocol === 'https:'; }catch(e){ return false; }
}

function panelSweepSvg(){
  return `<svg class="panel-sweep" viewBox="0 0 240 150" xmlns="http://www.w3.org/2000/svg">
    <path d="M240 6 C170 6 120 40 85 150" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M240 20 C177 20 132 52 105 150" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>
  </svg>`;
}
function panelHeader(eyebrow, title){
  return `
    <div class="panel-header">
      ${panelSweepSvg()}
      <button class="close-x close-x-light" id="detailClose">&times;</button>
      <span class="panel-eyebrow">${escapeHtml(eyebrow)}</span>
      <h2>${escapeHtml(title)}</h2>
    </div>
    <div class="panel-body">
  `;
}

function closeLibDetail(){
  document.getElementById('detailOverlay').classList.remove('open');
}
document.getElementById('detailOverlay').addEventListener('click', (ev) => {
  if(ev.target.id === 'detailOverlay') closeLibDetail();
});

// ============= Main nav (Reference Library / Team Notes) =============
document.querySelectorAll('.main-nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.main-nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + btn.dataset.view).classList.add('active');
  });
});

// ============= Reference Library =============
let libType = 'skills';
let libFilter = 'all';
let libSearch = '';

const libGrid = document.getElementById('libGrid');
const libCount = document.getElementById('libCount');
const libFilterTabs = document.getElementById('libFilterTabs');
const libSearchInput = document.getElementById('libSearch');

function departmentOptions(){
  const set = new Set(REFERENCE_DATA.skills.map(s => s.department).filter(Boolean));
  return Array.from(set);
}
function shortcutGroupOptions(){
  const set = new Set(REFERENCE_DATA.shortcuts.map(s => s.group).filter(Boolean));
  return Array.from(set);
}

function renderLibFilterTabs(){
  let opts = [];
  if(libType === 'skills') opts = departmentOptions();
  else if(libType === 'shortcuts') opts = shortcutGroupOptions();
  else opts = [];

  if(opts.length === 0){
    libFilterTabs.innerHTML = '';
    return;
  }
  const allBtn = `<button class="tab ${libFilter==='all'?'active':''}" data-filter="all">All</button>`;
  const rest = opts.map(o => `<button class="tab ${libFilter===o?'active':''}" data-filter="${escapeHtml(o)}">${escapeHtml(o)}</button>`).join('');
  libFilterTabs.innerHTML = allBtn + rest;
  libFilterTabs.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      libFilter = btn.dataset.filter;
      renderLibFilterTabs();
      renderLib();
    });
  });
}

function renderLib(){
  const term = libSearch.trim().toLowerCase();
  let items = [];

  if(libType === 'skills'){
    items = REFERENCE_DATA.skills.filter(s => {
      if(libFilter !== 'all' && s.department !== libFilter) return false;
      if(!term) return true;
      return (s.name + ' ' + s.purpose + ' ' + s.bestFor + ' ' + s.notes).toLowerCase().includes(term);
    });
  } else if(libType === 'shortcuts'){
    items = REFERENCE_DATA.shortcuts.filter(s => {
      if(libFilter !== 'all' && s.group !== libFilter) return false;
      if(!term) return true;
      return (s.label + ' ' + s.shortcut + ' ' + s.description).toLowerCase().includes(term);
    });
  } else {
    items = REFERENCE_DATA.tools.filter(t => {
      if(!term) return true;
      return (t.tool + ' ' + t.purpose + ' ' + t.useCase).toLowerCase().includes(term);
    });
  }

  libCount.textContent = items.length + (items.length === 1 ? ' entry' : ' entries');

  if(items.length === 0){
    libGrid.innerHTML = '<div class="empty">Nothing matches that search.</div>';
    return;
  }

  if(libType === 'skills'){
    libGrid.innerHTML = items.map((s, i) => `
      <div class="card" data-lib="skills" data-idx="${i}">
        <span class="card-tag">${escapeHtml(s.department)}</span>
        <p class="card-title">${escapeHtml(s.name)}</p>
        <p class="card-body">${escapeHtml(s.purpose)}</p>
        <div class="card-footer">
          <span class="card-badge">${escapeHtml(extractAccessTag(s.howToAccess) || 'Skills menu')}</span>
        </div>
      </div>
    `).join('');
  } else if(libType === 'shortcuts'){
    libGrid.innerHTML = items.map((s, i) => `
      <div class="card" data-lib="shortcuts" data-idx="${i}">
        <span class="card-tag">${escapeHtml(s.group)}</span>
        <p class="card-title">${escapeHtml(s.label)}</p>
        <p class="card-body">${escapeHtml(s.description)}</p>
        <div class="card-footer">
          <span class="card-badge">${escapeHtml(s.shortcut)}</span>
        </div>
      </div>
    `).join('');
  } else {
    libGrid.innerHTML = items.map((t, i) => `
      <div class="card" data-lib="tools" data-idx="${i}">
        <span class="card-tag">${escapeHtml(t.useCase)}</span>
        <p class="card-title">${escapeHtml(t.tool)}</p>
        <p class="card-body">${escapeHtml(t.purpose)}</p>
        <div class="card-footer">
          <span class="card-badge">${escapeHtml(t.pricing)}</span>
        </div>
      </div>
    `).join('');
  }

  // re-map indices back to filtered items for click handling
  libGrid.querySelectorAll('.card').forEach((card, i) => {
    card.addEventListener('click', () => openLibDetail(libType, items[i]));
  });
}

function extractAccessTag(howToAccess){
  if(!howToAccess) return '';
  const match = howToAccess.match(/\/[a-z0-9-]+/i);
  return match ? match[0] : '';
}

      <div class="detail-block"><div class="detail-label">Notes</div><div class="detail-value">${escapeHtml(item.notes)}</div></div>
    `;

    html += panelHeader(item.useCase, item.tool);
    html += `
      <div class="detail-block"><div class="detail-label">Purpose</div><div class="detail-value">${escapeHtml(item.purpose)}</div></div>
      <div class="detail-block"><div class="detail-label">Pricing</div><div class="detail-value">${escapeHtml(item.pricing)}</div></div>
      <div class="detail-block"><div class="detail-label">How to access</div><div class="detail-value">${escapeHtml(item.howToAccess)}</div></div>
      <div class="detail-block"><div class="detail-label">Notes</div><div class="detail-value">${escapeHtml(item.notes)}</div></div>
      <div class="detail-block"><div class="detail-label">How it helps Oryx</div><div class="detail-tip">${escapeHtml(item.oryxTip)}</div></div>

// ============= Team Notes (Firestore-backed) =============
const CATEGORY_LABELS = {
  commands: 'Commands / CLI',
  prompting: 'Prompting technique',
  skills: 'Skill / workflow',
  resources: 'Resource / link',
  discoveries: 'Discovery / note'
};

let entries = [];
let activeCat = 'all';
let searchTerm = '';

const grid = document.getElementById('grid');
const countRow = document.getElementById('countRow');
const tabsWrap = document.getElementById('tabs');
const overlay = document.getElementById('overlay');

function listenForEntries(){
  entriesCollection.orderBy('createdAt', 'desc').onSnapshot(
    (snapshot) => {
      entries = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      syncStatusEl.textContent = 'Live · synced with team';
      syncStatusEl.className = 'sync-status live';
      render();
    },
    (err) => {
      console.error('Firestore sync error:', err);
      syncStatusEl.textContent = 'Connection error — check setup';
      syncStatusEl.className = 'sync-status error';
    }
  );
}

function render(){
  const term = searchTerm.trim().toLowerCase();
  const filtered = entries.filter(e => {
    const catMatch = activeCat === 'all' || e.category === activeCat;
    if(!catMatch) return false;
    if(!term) return true;
    return (e.title + ' ' + e.body + ' ' + (e.author||'')).toLowerCase().includes(term);
  }).sort((a,b) => b.createdAt - a.createdAt);

  countRow.textContent = filtered.length + (filtered.length === 1 ? ' entry' : ' entries');

  if(filtered.length === 0){
    grid.innerHTML = '<div class="empty">No entries here yet. Be the first to add one.</div>';
    return;
  }

  grid.innerHTML = filtered.map(e => {
    const linkHtml = e.link ? `<div class="card-link"><a href="${escapeHtml(e.link)}" target="_blank" rel="noopener">${escapeHtml(e.link)}</a></div>` : '';
    const dateStr = new Date(e.createdAt).toLocaleDateString(undefined, {month:'short', day:'numeric'});
    const preview = e.category === 'skills' ? e.purpose : e.body;
    return `
      <div class="card" data-id="${e.id}">
        <span class="card-tag">${escapeHtml(e.category === 'skills' && e.department ? e.department : (CATEGORY_LABELS[e.category] || e.category))}</span>
        <p class="card-title">${escapeHtml(e.title)}</p>
        <p class="card-body">${escapeHtml(preview)}</p>
        ${linkHtml}
        <div class="card-footer">
          <span>${escapeHtml(e.author || 'Anonymous')} · ${dateStr}</span>
          <button class="card-del" data-id="${e.id}">Remove</button>
        </div>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const entry = filtered.find(e => e.id === card.dataset.id);
      if(entry) openNoteDetail(entry);
    });
  });

  grid.querySelectorAll('.card-del').forEach(btn => {
    btn.addEventListener('click', async (ev) => {
      ev.stopPropagation();
      const id = btn.dataset.id;
      btn.disabled = true;
      btn.textContent = 'Removing…';
      try{
        await entriesCollection.doc(id).delete();
      }catch(e){
        alert('Could not remove that entry. Check your connection and try again.');
        btn.disabled = false;
        btn.textContent = 'Remove';
      }
    });
  });
}

function openNoteDetail(entry){
  const panel = document.getElementById('detailPanel');
  const dateStr = new Date(entry.createdAt).toLocaleDateString(undefined, {year:'numeric', month:'long', day:'numeric'});
  const linkHtml = entry.link
    ? `<a href="${escapeHtml(entry.link)}" target="_blank" rel="noopener">${escapeHtml(entry.link)}</a>`
    : 'Not provided';

  let html;
  if(entry.category === 'skills'){
    html = panelHeader(entry.department || CATEGORY_LABELS.skills, entry.title);
    html += `
      <div class="detail-block"><div class="detail-label">Purpose</div><div class="detail-value">${escapeHtml(entry.purpose)}</div></div>
      <div class="detail-block"><div class="detail-label">Sample prompt</div><div class="detail-value mono">${escapeHtml(entry.samplePrompt)}</div></div>
      <div class="detail-block"><div class="detail-label">Best for</div><div class="detail-value">${escapeHtml(entry.bestFor)}</div></div>
      <div class="detail-block"><div class="detail-label">Example output</div><div class="detail-value">${escapeHtml(entry.exampleOutput)}</div></div>
      <div class="detail-block"><div class="detail-label">How to access</div><div class="detail-value">${escapeHtml(entry.howToAccess)}</div></div>
      <div class="detail-block"><div class="detail-label">Notes</div><div class="detail-value">${escapeHtml(entry.notes)}</div></div>
      <div class="detail-block"><div class="detail-label">How it helps Oryx Doors and Windows</div><div class="detail-tip">${escapeHtml(entry.oryxTip)}</div></div>
      <div class="detail-block"><div class="detail-label">Link</div><div class="detail-value">${linkHtml}</div></div>
      <div class="detail-block"><div class="detail-label">Added by</div><div class="detail-value">${escapeHtml(entry.author || 'Anonymous')}</div></div>
      <div class="detail-block"><div class="detail-label">Date added</div><div class="detail-value">${dateStr}</div></div>
    `;
  } else {
    html = panelHeader(CATEGORY_LABELS[entry.category] || entry.category, entry.title);
    html += `
      <div class="detail-block"><div class="detail-label">Details</div><div class="detail-value">${escapeHtml(entry.body)}</div></div>
      <div class="detail-block"><div class="detail-label">Link</div><div class="detail-value">${linkHtml}</div></div>
      <div class="detail-block"><div class="detail-label">Added by</div><div class="detail-value">${escapeHtml(entry.author || 'Anonymous')}</div></div>
      <div class="detail-block"><div class="detail-label">Date added</div><div class="detail-value">${dateStr}</div></div>
    `;
  }
  html += `</div>`;

  panel.innerHTML = html;
  document.getElementById('detailOverlay').classList.add('open');
  document.getElementById('detailClose').addEventListener('click', closeLibDetail);
}

tabsWrap.addEventListener('click', (ev) => {
  const btn = ev.target.closest('.tab');
  if(!btn) return;
  tabsWrap.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  render();
});

document.getElementById('searchInput').addEventListener('input', (ev) => {
  searchTerm = ev.target.value;
  render();
});

const openAdd = document.getElementById('openAdd');
const closePanel = document.getElementById('closePanel');
const cancelAdd = document.getElementById('cancelAdd');
const saveAdd = document.getElementById('saveAdd');

const fCategory = document.getElementById('fCategory');
const simpleFields = document.getElementById('simpleFields');
const skillFields = document.getElementById('skillFields');
const SKILL_FIELD_IDS = ['fDepartment','fPurpose','fSamplePrompt','fBestFor','fExampleOutput','fNotes','fHowToAccess','fOryxTip'];

function toggleEntryFields(){
  const isSkill = fCategory.value === 'skills';
  simpleFields.style.display = isSkill ? 'none' : '';
  skillFields.style.display = isSkill ? '' : 'none';
}
fCategory.addEventListener('change', toggleEntryFields);

function openOverlay(){
  overlay.classList.add('open');
  let savedAuthor = '';
  try{ savedAuthor = localStorage.getItem(AUTHOR_KEY) || ''; }catch(e){}
  document.getElementById('fAuthor').value = savedAuthor;
  toggleEntryFields();
}
function closeOverlay(){
  overlay.classList.remove('open');
  document.getElementById('fTitle').value = '';
  document.getElementById('fBody').value = '';
  document.getElementById('fLink').value = '';
  document.getElementById('errTitle').style.display = 'none';
  document.getElementById('errBody').style.display = 'none';
  document.getElementById('errPurpose').style.display = 'none';
  SKILL_FIELD_IDS.forEach(id => { document.getElementById(id).value = ''; });
}

openAdd.addEventListener('click', openOverlay);
closePanel.addEventListener('click', closeOverlay);
cancelAdd.addEventListener('click', closeOverlay);
overlay.addEventListener('click', (ev) => { if(ev.target === overlay) closeOverlay(); });

saveAdd.addEventListener('click', async () => {
  const title = document.getElementById('fTitle').value.trim();
  const body = document.getElementById('fBody').value.trim();
  const link = document.getElementById('fLink').value.trim();
  const author = document.getElementById('fAuthor').value.trim();
  const category = fCategory.value;
  const isSkill = category === 'skills';

  const skillValues = {};
  SKILL_FIELD_IDS.forEach(id => {
    skillValues[id] = document.getElementById(id).value.trim();
  });

  let valid = true;
  if(!title){ document.getElementById('errTitle').style.display = 'block'; valid = false; }
  else { document.getElementById('errTitle').style.display = 'none'; }

  if(isSkill){
    if(!skillValues.fPurpose){ document.getElementById('errPurpose').style.display = 'block'; valid = false; }
    else { document.getElementById('errPurpose').style.display = 'none'; }
  } else {
    if(!body){ document.getElementById('errBody').style.display = 'block'; valid = false; }
    else { document.getElementById('errBody').style.display = 'none'; }
  }

  if(link && !isValidLink(link)){
    alert('That link doesn\'t look valid. Include https:// or leave it blank.');
    valid = false;
  }
  if(!valid) return;

  saveAdd.disabled = true;
  saveAdd.textContent = 'Saving…';

  const entryData = {
    category, title, link,
    author: author || 'Anonymous',
    createdAt: Date.now(),
    body: isSkill ? '' : body,
    department: isSkill ? skillValues.fDepartment : '',
    purpose: isSkill ? skillValues.fPurpose : '',
    samplePrompt: isSkill ? skillValues.fSamplePrompt : '',
    bestFor: isSkill ? skillValues.fBestFor : '',
    exampleOutput: isSkill ? skillValues.fExampleOutput : '',
    notes: isSkill ? skillValues.fNotes : '',
    howToAccess: isSkill ? skillValues.fHowToAccess : '',
    oryxTip: isSkill ? skillValues.fOryxTip : ''
  };

  try{
    await entriesCollection.add(entryData);
    if(author){
      try{ localStorage.setItem(AUTHOR_KEY, author); }catch(e){}
    }
    closeOverlay();
  }catch(e){
    alert('Could not save that entry. Check your connection and try again.');
  }finally{
    saveAdd.disabled = false;
    saveAdd.textContent = 'Save entry';
  }
});

listenForEntries();
</script>
